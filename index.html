<!DOCTYPE html>
<html lang="en-us">
  <head>
<script data-local-runtime-shim>
(function () {
  window.__gaTracker = window.__gaTracker || function () {};
  window.GameMonetize = window.GameMonetize || {};
  var sdk = window.gdsdk || {};
  sdk.AdType = sdk.AdType || { Interstitial: 0, Rewarded: 1, Display: 2 };
  function emit(name) {
    var options = window.GD_OPTIONS;
    if (options && typeof options.onEvent === "function") options.onEvent({ name: name });
  }
  sdk.preloadAd = function () { return Promise.resolve("gdsdk://preloaded"); };
  sdk.showAd = function () {
    emit("SDK_GAME_PAUSE");
    return Promise.resolve().then(function () { emit("SDK_GAME_START"); return true; });
  };
  window.gdsdk = sdk;
})();
</script>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Striker Dummies</title>
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="TemplateData/UnityProgress.js"></script>
    <script src="Build/UnityLoader.js"></script>
    <script>
      var gameInstance = UnityLoader.instantiate("gameContainer", "Build/StrikerDummies.json", {onProgress: UnityProgress});
    </script>
  </head>
  <body>
    <div class="webgl-content">
      <div id="gameContainer" style="width: 850px; height: 500px"></div>
      <div class="footer">
        <div class="webgl-logo"></div>
        <div class="fullscreen" onclick="gameInstance.SetFullscreen(1)"></div>
        <div class="title">Striker Dummies</div>
      </div>
    </div>
  </body>
</html>
